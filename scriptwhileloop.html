<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script While Loot</title>
</head>
<body>
    <script>
        let n=Number(prompt("Enter the number"));
        
        while(n<=7){
            console.log(n);
            n++;
        }
    </script>
