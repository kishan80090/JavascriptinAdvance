<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datalist</title>
</head>
<body>
   <input type="text" list="op" />
   <datalist id="op"></datalist>

  <script>
    let arr=["Varanasi","Mirjapur","Prayagraj","Maharajganj"];
    let datalist=document.getElementById("op");
    for(let i=0;i<arr.length;i++){
        let option=document.createElement("option");
        option.value=arr[i];
        datalist.appendChild(option);
    }
   </script>
</body>
</html>
