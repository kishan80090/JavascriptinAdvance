<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Page</title>
</head>
<body>
  <div id="d">
     
  </div>
  <button onclick="f()">Click to Add</button>
    <script>
  const d=document.querySelector("#d");
  function f(){
   let newelement=document.createElement("button");
    d.appendChild(newelement);
   newelement.innerHTML="New Button";
  }</script>
</body>
</html>
