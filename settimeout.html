<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Process</title>
</head>
<body>

    <img id="f" src="pic/1image.jpg" width="300" height="200">
    <script>
        let images = ["pic/0image.jpg","pic/1image.jpg","pic/2image.jpg","pic/3image.jpg"];
        let index = 0;

        setInterval(Data,1000);

        function Data()
        {
            document.getElementById("f").src=images[index];
            index++;

            if (index==images.length) 
            {
                index = 0;
            }
        }; 
    </script>
</body>
</html>
