<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text to Speech</title>

    <style>
      body {
        justify-content: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
      }

      .t {
        width: 400px;
        height: 150px;
        font-size: 16px;
        padding: 10px;
      }

      .texts {
        height: 40px;
        width: 150px;
        border: 1px solid rgba(0, 0, 255, 0.826);
        border-radius: 999px;
        padding: 3px 32px;
        background-color: blue;
        margin-top: 20px;
        font-size: 20px;
        color: #f9f9f9;
        cursor: pointer;
        box-shadow: 0 4px 15px #38bdf8aa;
        transition: all 0.3s ease;
      }

      .texts:hover {
        transform: translateY(-3px);
      }
    </style>
  </head>

  <body>

    <textarea class="t" placeholder="Message..."></textarea>
    <button class="texts">Speak</button>

    <script>

      const button = document.querySelector(".texts");
      const textarea = document.querySelector(".t");

       button.addEventListener("click", () => {
        
        const text = textarea.value;

        const speech = new SpeechSynthesisUtterance(text);        
        window.speechSynthesis.speak(speech);

      });

    </script>
  </body>
</html>
